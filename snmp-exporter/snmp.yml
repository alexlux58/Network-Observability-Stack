modules:
  # General system overview (hostname, description, uptime, contact/location, etc.)
  system:
    version: 2
    auth:
      community: public
    walk:
      - 1.3.6.1.2.1.1        # system

  # Interface statistics (basic + high-capacity counters)
  if_mib:
    version: 2
    auth:
      community: public
    walk:
      - 1.3.6.1.2.1.2        # interfaces
      - 1.3.6.1.2.1.31.1.1   # ifXTable
    lookups:
      - source_indexes: [ifIndex]
        lookup: ifDescr
      - source_indexes: [ifIndex]
        lookup: ifName

  # Host resources (CPU, memory, storage) - only works on devices that support HOST-RESOURCES-MIB
  host_resources:
    version: 2
    auth:
      community: public
    walk:
      - 1.3.6.1.2.1.25.1     # hrSystem
      - 1.3.6.1.2.1.25.2     # hrStorage
      - 1.3.6.1.2.1.25.3     # hrDevice
      - 1.3.6.1.2.1.25.4     # hrSWRun
      - 1.3.6.1.2.1.25.5     # hrSWRunPerf

  # IP stack statistics (routing, TCP/UDP counters, etc.)
  ip_stack:
    version: 2
    auth:
      community: public
    walk:
      - 1.3.6.1.2.1.4        # ip
      - 1.3.6.1.2.1.6        # tcp
      - 1.3.6.1.2.1.7        # udp
