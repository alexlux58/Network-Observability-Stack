[linux_hosts]
# Example: Ubuntu / Debian / RHEL servers
ansible-puppet ansible_host=192.168.5.8
ubuntuvm ansible_host=192.168.4.28
ubuntuserv2 ansible_host=192.168.5.9

[linux_hosts:vars]
ansible_user=YOUR_SSH_USER
ansible_become=true

[windows_hosts]
# Example: Windows desktops / servers
win-desktop-1 ansible_host=192.168.4.210
win-desktop-2 ansible_host=192.168.4.211

[windows_hosts:vars]
ansible_user=YOUR_WINDOWS_USER
ansible_password=YOUR_WINDOWS_PASSWORD
ansible_connection=winrm
ansible_winrm_transport=ntlm
ansible_winrm_server_cert_validation=ignore

